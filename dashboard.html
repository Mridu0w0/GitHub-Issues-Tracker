<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="shortcut icon" href="./assets/Aperture.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css"> 
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <i class="fa-brands fa-github text-4xl"></i>
            <span class="text-lg font-bold text-gray-900">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative">
                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input id="search-input" type="text" placeholder="Search issues..." class="pl-9 pr-4 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-[#4B00FF] focus:border-[#4B00FF] w-64">            </div>
            <button class="bg-[#4B00FF] hover:bg-[#3b00c9] text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-2">
                <span>+</span> New Issue
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 mt-8">
        
          <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6 flex gap-2 w-max">
            <button id="btn-all" onclick="filterIssues('all')" class="bg-[#4B00FF] text-white px-6 py-1.5 rounded-md text-sm font-medium transition-colors">All</button>
            <button id="btn-open" onclick="filterIssues('open')" class="text-gray-600 hover:bg-gray-50 px-6 py-1.5 rounded-md text-sm font-medium border border-transparent hover:border-gray-200 transition-colors">Open</button>
            <button id="btn-closed" onclick="filterIssues('closed')" class="text-gray-600 hover:bg-gray-50 px-6 py-1.5 rounded-md text-sm font-medium border border-transparent hover:border-gray-200 transition-colors">Closed</button>
        </div>


        <div class="bg-white rounded-t-lg shadow-sm border border-gray-200 p-6 flex justify-between items-center border-b-0">
            <div class="flex items-center gap-4">
                <div class="bg-[#f3f0ff] p-3 rounded-full text-[#4B00FF]">
                    <img src="./assets/Aperture.png" alt="Issues" >
                </div>
                <div>
                    <h2 id="issue-count" class="text-xl font-bold text-gray-900">Loading Issues...</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-medium text-gray-700">
                <span class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-[#2da44e]"></div> Open</span>
                <span class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-[#8250df]"></div> Closed</span>
            </div>
        </div>

        <div class="bg-white rounded-b-lg shadow-sm border border-gray-200 p-6">
            <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </div>
    </div>
    <div id="issue-modal" onclick="closeModal()" class="fixed inset-0 bg-[rgba(15,23,42,0.6)] z-50 hidden flex items-center justify-center backdrop-blur-sm transition-all">
        <div onclick="event.stopPropagation()" class="bg-white rounded-lg p-8 w-full max-w-2xl mx-4 relative shadow-2xl">
            
            <h2 id="modal-title" class="text-2xl font-bold mb-3 text-gray-900">Issue Title</h2>
            
            <div class="flex items-center gap-2 mb-4 text-sm text-gray-500">
                <span id="modal-status-badge" class="px-3 py-1 rounded-full text-white text-xs font-semibold">Status</span>
                <span>• Opened by <span id="modal-author" class="font-medium">Author</span> • <span id="modal-date">Date</span></span>
            </div>
            
            <div id="modal-labels" class="flex gap-2 mb-6 text-[10px] font-semibold flex-wrap">
                <span class="px-2 py-1 rounded-full border border-[#ff8182] text-[#cf222e] flex items-center gap-1 bg-[#ffebe9]">🐞 BUG</span>
                <span class="px-2 py-1 rounded-full border border-[#d4a72c] text-[#9a6700] flex items-center gap-1 bg-[#fff8c5]">🤝 HELP WANTED</span>
            </div>

            <p id="modal-desc" class="text-gray-600 text-sm mb-8 leading-relaxed">Description goes here...</p>

            <div class="flex gap-16 bg-gray-50 p-5 rounded-lg mb-8 border border-gray-100">
                <div>
                    <p class="text-gray-500 text-xs mb-1">Assignee:</p>
                    <p id="modal-assignee" class="font-bold text-sm text-gray-900">Unassigned</p>
                </div>
                <div>
                    <p class="text-gray-500 text-xs mb-1">Priority:</p>
                    <div id="modal-priority">
                        </div>
                </div>
            </div>

            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-[#4B00FF] hover:bg-[#3b00c9] text-white px-8 py-2.5 rounded-md text-sm font-semibold transition-colors shadow-sm">Close</button>
            </div>
        </div>
    </div>

    <script src="./scripts/index.js"></script>  
    
</body>
</html>
